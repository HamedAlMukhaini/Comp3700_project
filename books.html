<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Makes page responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest - Inventory Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
crossorigin="anonymous">
</script>

    <style>
        /* Header style */
        .hero { background-color: #3d1f0a; color: white; }

        /* Orange button */
        .btn-orange { background-color: #bd5e1b; color: white; border: none; }

        /* Hover effect */
        .btn-orange:hover { background-color: #a04e16; color: white; }

        /* Custom table header */
        .table-header-custom { background-color: #3d1f0a; color: white; }
    </style>
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #3d1f0a;">
        <div class="container">
            <a class="navbar-brand" href="index.html">BookNest</a>

            <!-- Menu links -->
            <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="books.html">Books</a>
            <a class="nav-link" href="return and borrow.html">Borrow / Return</a>
            <a class="nav-link" href="questionnaire.html">Questionnaire</a>
            <a class="nav-link" href="calculate.html">Calculate</a>
            <a class="nav-link" href="fun.html">Fun Page</a>
</div>
        </div>
    </nav>

    <div class="container mt-5">

        <!-- Page title -->
        <h2 class="text-center mb-4">Library Management System</h2>

        <!-- Search box -->
        <div class="row mb-4">
            <div class="col-md-8 mx-auto">
                <div class="card p-3 shadow-sm border-0">
                    <label class="fw-bold mb-2">Search Catalog:</label>

                    <!-- Calls executeSearch when typing -->
                    <input type="text" id="searchInput" class="form-control"
                    placeholder="Search for books or categories..."
                    onkeyup="executeSearch()">
                </div>
            </div>
        </div>

        <!-- Books table -->
        <h4 class="mb-3">Books Inventory</h4>
        <div class="table-responsive mb-5 shadow-sm rounded">
            <table class="table table-bordered table-hover bg-white mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Book Title</th>
                        <th>Author</th>
                        <th>Price (OMR)</th>
                    </tr>
                </thead>

                <!-- Data added by JS -->
                <tbody id="booksTableBody"></tbody>
            </table>
        </div>

        <!-- Categories table -->
        <h4 class="mb-3">Library Categories</h4>
        <div class="table-responsive mb-5 shadow-sm rounded">
            <table class="table table-bordered bg-white mb-0">
                <thead class="table-primary">
                    <tr>
                        <th>Cat ID</th>
                        <th>Category Name</th>
                        <th>Library Section</th>
                    </tr>
                </thead>

                <!-- Data added by JS -->
                <tbody id="categoriesTableBody"></tbody>
            </table>
        </div>

        <!-- Form to add book or category -->
        <div class="card shadow-sm mb-5 border-0">
            <div class="card-header hero py-3">
                <h5 class="mb-0">Add New Record</h5>
            </div>

            <div class="card-body bg-white">
                <form id="entryForm" class="row g-3">

                    <!-- Select type -->
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Type</label>
                        <select id="entryType" class="form-select">
                            <option value="book">Book</option>
                            <option value="category">Category</option>
                        </select>
                    </div>

                    <!-- Title or name -->
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Title / Name</label>
                        <input type="text" id="field1" class="form-control" required>
                    </div>

                    <!-- Author or section -->
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Author / Section</label>
                        <input type="text" id="field2" class="form-control" required>
                    </div>

                    <!-- Price (only for books) -->
                    <div class="col-md-2">
                        <label class="form-label fw-bold">Price (Books only)</label>
                        <input type="number" id="field3" class="form-control" step="0.001">
                    </div>

                    <!-- Add button -->
                    <div class="col-md-1 d-flex align-items-end">
                        <button type="button" class="btn btn-orange w-100"
                        onclick="handleAddition()">Add</button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script>
        // Book object
        function Book(id, title, author, price) {
            this.id = id;
            this.title = title;
            this.author = author;
            this.price = price;
        }

        // Category object
        function Category(cid, name, section) {
            this.cid = cid;
            this.name = name;
            this.section = section;
        }

        // Initial books data
        let booksArray = [
            new Book(1, "The Great Gatsby", "F. Scott Fitzgerald", 12.500),
            new Book(2, "The Road", "Cormac McCarthy", 10.000),
            new Book(3, "The City of God", "Saint Augustine", 15.250),
            new Book(4, "Hamlet", "William Shakespeare", 8.000),
            new Book(5, "The Art of War", "Sun Tzu", 5.500)
        ];

        // Initial categories data
        let categoriesArray = [
            new Category(101, "Classic Literature", "Wing A"),
            new Category(102, "Modern Fiction", "Wing B"),
            new Category(103, "History & Philosophy", "Wing C")
        ];

        // Fill books table
        function fillBooksTable(data) {
            const body = document.getElementById("booksTableBody");
            body.innerHTML = ""; // clear table

            data.forEach(b => {
                let row = body.insertRow();
                row.insertCell(0).innerText = b.id;
                row.insertCell(1).innerText = b.title;
                row.insertCell(2).innerText = b.author;
                row.insertCell(3).innerText = b.price.toFixed(3);
            });
        }

        // Fill categories table
        function fillCategoriesTable(data) {
            const body = document.getElementById("categoriesTableBody");
            body.innerHTML = "";

            data.forEach(c => {
                let row = body.insertRow();
                row.insertCell(0).innerText = c.cid;
                row.insertCell(1).innerText = c.name;
                row.insertCell(2).innerText = c.section;
            });
        }

        // Add new book or category
        function handleAddition() {
            const type = document.getElementById("entryType").value;
            const val1 = document.getElementById("field1").value;
            const val2 = document.getElementById("field2").value;
            const val3 = document.getElementById("field3").value;

            // Check required fields
            if (!val1 || !val2) {
                alert("Please fill the required fields.");
                return;
            }

            // If adding book
            if (type === "book") {
                let nextId = booksArray.length > 0 ? booksArray[booksArray.length - 1].id + 1 : 1;
                booksArray.push(new Book(nextId, val1, val2, parseFloat(val3 || 0)));
                fillBooksTable(booksArray);
            } 
            // If adding category
            else {
                let nextCid = categoriesArray.length > 0 ? categoriesArray[categoriesArray.length - 1].cid + 1 : 101;
                categoriesArray.push(new Category(nextCid, val1, val2));
                fillCategoriesTable(categoriesArray);
            }

            // Clear form
            document.getElementById("entryForm").reset();
        }

        // Search function
        function executeSearch() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            
            // Filter books
            const filteredBooks = booksArray.filter(b => 
                b.title.toLowerCase().includes(query) || 
                b.author.toLowerCase().includes(query)
            );
            fillBooksTable(filteredBooks);

            // Filter categories
            const filteredCats = categoriesArray.filter(c => 
                c.name.toLowerCase().includes(query) || 
                c.section.toLowerCase().includes(query)
            );
            fillCategoriesTable(filteredCats);
        }

        // Run when page loads
        window.onload = function() {
            fillBooksTable(booksArray);
            fillCategoriesTable(categoriesArray);
        };
    </script>

</body>
</html>
